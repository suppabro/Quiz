<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Office Logo Quiz - Host Mode</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        body { 
            font-family: 'Poppins', sans-serif; 
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364); 
            height: 100vh; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
        }
        .quiz-container { 
            background: white; 
            border-radius: 16px; 
            padding: 40px; 
            width: 90%; 
            max-width: 600px; 
            text-align: center; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.3); 
        }
        .logo-display { 
            width: auto; 
            max-width: 100%;
            height: 220px; 
            object-fit: contain; 
            margin: 0 auto 20px auto; 
            display: block;
            transition: 0.3s; 
        }
        .answer-reveal { 
            font-size: 2.5rem; 
            font-weight: 800; 
            color: #333; 
            margin: 20px 0; 
            display: none; 
        }
        .btn-group { 
            display: flex; 
            justify-content: center; 
            gap: 15px; 
            margin-top: 20px; 
        }
        button { 
            border: none; 
            padding: 15px 30px; 
            font-size: 1.2rem; 
            border-radius: 8px; 
            cursor: pointer; 
            color: white; 
            font-weight: 600; 
            transition: 0.2s; 
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        #reveal-btn { background: #3a7bd5; }
        #correct-btn { background: #4caf50; display: none; }
        #incorrect-btn { background: #f44336; display: none; }
        .info { 
            font-size: 1.2rem; 
            color: #666; 
            margin-bottom: 20px; 
            font-weight: 600;
        }
    </style>
</head>
<body>

<div class="quiz-container">
    <div class="info">Question <span id="q-num">1</span> / 30 | Team Score: <span id="score">0</span></div>
    
    <img id="logo-image" class="logo-display" src="" alt="Quiz Logo">
    <div id="answer-text" class="answer-reveal"></div>
    
    <div class="btn-group">
        <button id="reveal-btn" onclick="reveal()">Reveal Answer</button>
        <button id="correct-btn" onclick="scorePoint(true)">Correct ✅</button>
        <button id="incorrect-btn" onclick="scorePoint(false)">Incorrect ❌</button>
    </div>
</div>

<script>
    // Bulletproof SVG CDN. These will NEVER blur!
    const quizData = [
        { answer: "TOYOTA", image: "https://cdn.simpleicons.org/toyota" },
        { answer: "HONDA", image: "https://cdn.simpleicons.org/honda" },
        { answer: "BMW", image: "https://cdn.simpleicons.org/bmw" },
        { answer: "MERCEDES-BENZ", image: "https://cdn.simpleicons.org/mercedes" },
        { answer: "AUDI", image: "https://cdn.simpleicons.org/audi" },
        { answer: "YAMAHA", image: "https://cdn.simpleicons.org/yamaha" },
        { answer: "FORD", image: "https://cdn.simpleicons.org/ford" },
        { answer: "SAMSUNG", image: "https://cdn.simpleicons.org/samsung" },
        { answer: "APPLE", image: "https://cdn.simpleicons.org/apple" },
        { answer: "GITHUB", image: "https://cdn.simpleicons.org/github" },
        { answer: "WHATSAPP", image: "https://cdn.simpleicons.org/whatsapp" },
        { answer: "GOOGLE", image: "https://cdn.simpleicons.org/google" },
        { answer: "MICROSOFT", image: "https://cdn.simpleicons.org/microsoft" },
        { answer: "INTEL", image: "https://cdn.simpleicons.org/intel" },
        { answer: "COCA-COLA", image: "https://cdn.simpleicons.org/cocacola" },
        { answer: "PEPSI", image: "https://cdn.simpleicons.org/pepsi" },
        { answer: "MCDONALD'S", image: "https://cdn.simpleicons.org/mcdonalds" },
        { answer: "KFC", image: "https://cdn.simpleicons.org/kfc" },
        { answer: "STARBUCKS", image: "https://cdn.simpleicons.org/starbucks" },
        { answer: "NESTLÉ", image: "https://cdn.simpleicons.org/nestle" },
        { answer: "RED BULL", image: "https://cdn.simpleicons.org/redbull" },
        { answer: "NIKE", image: "https://cdn.simpleicons.org/nike" },
        { answer: "ADIDAS", image: "https://cdn.simpleicons.org/adidas" },
        { answer: "PUMA", image: "https://cdn.simpleicons.org/puma" },
        { answer: "YOUTUBE", image: "https://cdn.simpleicons.org/youtube" },
        { answer: "VISA", image: "https://cdn.simpleicons.org/visa" },
        { answer: "MASTERCARD", image: "https://cdn.simpleicons.org/mastercard" },
        { answer: "AMAZON", image: "https://cdn.simpleicons.org/amazon" },
        { answer: "SONY", image: "https://cdn.simpleicons.org/sony" },
        { answer: "TESLA", image: "https://cdn.simpleicons.org/tesla" }
    ];

    let current = 0;
    let score = 0;

    function load() {
        document.getElementById('logo-image').src = quizData[current].image;
        document.getElementById('answer-text').style.display = 'none';
        
        document.getElementById('reveal-btn').style.display = 'inline-block';
        document.getElementById('correct-btn').style.display = 'none';
        document.getElementById('incorrect-btn').style.display = 'none';
        
        document.getElementById('q-num').textContent = current + 1;
    }

    function reveal() {
        document.getElementById('answer-text').textContent = quizData[current].answer;
        document.getElementById('answer-text').style.display = 'block';
        
        document.getElementById('reveal-btn').style.display = 'none';
        document.getElementById('correct-btn').style.display = 'inline-block';
        document.getElementById('incorrect-btn').style.display = 'inline-block';
    }

    function scorePoint(isCorrect) {
        if(isCorrect) {
            score++;
            document.getElementById('score').textContent = score;
            confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
        }
        current++;
        if(current < quizData.length) {
            load();
        } else {
            document.getElementById('logo-image').style.display = 'none';
            document.getElementById('answer-text').innerHTML = `Game Over!<br>Final Score: ${score} / 30`;
            document.getElementById('answer-text').style.display = 'block';
            document.getElementById('correct-btn').style.display = 'none';
            document.getElementById('incorrect-btn').style.display = 'none';
            
            var duration = 3000;
            var end = Date.now() + duration;
            (function frame() {
                confetti({ particleCount: 5, angle: 60, spread: 55, origin: { x: 0 } });
                confetti({ particleCount: 5, angle: 120, spread: 55, origin: { x: 1 } });
                if (Date.now() < end) requestAnimationFrame(frame);
            }());
        }
    }

    load();
</script>
</body>
</html>
