<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Office Logo Quiz - Host Mode</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        body { 
            font-family: 'Poppins', sans-serif; 
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364); 
            height: 100vh; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
        }
        .quiz-container { 
            background: white; 
            border-radius: 16px; 
            padding: 40px; 
            width: 90%; 
            max-width: 600px; 
            text-align: center; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.3); 
        }
        .logo-display { 
            width: 100%; 
            height: 300px; 
            object-fit: contain; 
            margin-bottom: 20px; 
            transition: 0.3s; 
            border-radius: 8px;
        }
        .answer-reveal { 
            font-size: 2.5rem; 
            font-weight: 800; 
            color: #333; 
            margin: 20px 0; 
            display: none; 
        }
        .btn-group { 
            display: flex; 
            justify-content: center; 
            gap: 15px; 
            margin-top: 20px; 
        }
        button { 
            border: none; 
            padding: 15px 30px; 
            font-size: 1.2rem; 
            border-radius: 8px; 
            cursor: pointer; 
            color: white; 
            font-weight: 600; 
            transition: 0.2s; 
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        #reveal-btn { background: #3a7bd5; }
        #correct-btn { background: #4caf50; display: none; }
        #incorrect-btn { background: #f44336; display: none; }
        .info { 
            font-size: 1.2rem; 
            color: #666; 
            margin-bottom: 20px; 
            font-weight: 600;
        }
    </style>
</head>
<body>

<div class="quiz-container">
    <div class="info">Question <span id="q-num">1</span> / 30 | Team Score: <span id="score">0</span></div>
    
    <img id="logo-image" class="logo-display" src="" alt="Quiz Logo">
    <div id="answer-text" class="answer-reveal"></div>
    
    <div class="btn-group">
        <button id="reveal-btn" onclick="reveal()">Reveal Answer</button>
        <button id="correct-btn" onclick="scorePoint(true)">Correct ✅</button>
        <button id="incorrect-btn" onclick="scorePoint(false)">Incorrect ❌</button>
    </div>
</div>

<script>
    // Replace the placehold.co links with your actual image file names (e.g., "toyota.png") once uploaded to GitHub
    const quizData = [
        { answer: "BAJAJ", image: "https://placehold.co/400x300/EEEEEE/333333?text=Bajaj" },
        { answer: "TOYOTA", image: "https://placehold.co/400x300/EEEEEE/333333?text=Toyota" },
        { answer: "HONDA", image: "https://placehold.co/400x300/EEEEEE/333333?text=Honda" },
        { answer: "BMW", image: "https://placehold.co/400x300/EEEEEE/333333?text=BMW" },
        { answer: "MERCEDES-BENZ", image: "https://placehold.co/400x300/EEEEEE/333333?text=Mercedes" },
        { answer: "AUDI", image: "https://placehold.co/400x300/EEEEEE/333333?text=Audi" },
        { answer: "YAMAHA", image: "https://placehold.co/400x300/EEEEEE/333333?text=Yamaha" },
        { answer: "FORD", image: "https://placehold.co/400x300/EEEEEE/333333?text=Ford" },
        { answer: "SAMSUNG", image: "https://placehold.co/400x300/EEEEEE/333333?text=Samsung" },
        { answer: "APPLE", image: "https://placehold.co/400x300/EEEEEE/333333?text=Apple" },
        { answer: "GITHUB", image: "https://placehold.co/400x300/EEEEEE/333333?text=GitHub" },
        { answer: "WHATSAPP", image: "https://placehold.co/400x300/EEEEEE/333333?text=WhatsApp" },
        { answer: "DIALOG AXIATA", image: "https://placehold.co/400x300/EEEEEE/333333?text=Dialog" },
        { answer: "GOOGLE", image: "https://placehold.co/400x300/EEEEEE/333333?text=Google" },
        { answer: "MICROSOFT", image: "https://placehold.co/400x300/EEEEEE/333333?text=Microsoft" },
        { answer: "INTEL", image: "https://placehold.co/400x300/EEEEEE/333333?text=Intel" },
        { answer: "COCA-COLA", image: "https://placehold.co/400x300/EEEEEE/333333?text=Coca-Cola" },
        { answer: "PEPSI", image: "https://placehold.co/400x300/EEEEEE/333333?text=Pepsi" },
        { answer: "MCDONALD'S", image: "https://placehold.co/400x300/EEEEEE/333333?text=McDonalds" },
        { answer: "KFC", image: "https://placehold.co/400x300/EEEEEE/333333?text=KFC" },
        { answer: "STARBUCKS", image: "https://placehold.co/400x300/EEEEEE/333333?text=Starbucks" },
        { answer: "NESTLÉ", image: "https://placehold.co/400x300/EEEEEE/333333?text=Nestle" },
        { answer: "RED BULL", image: "https://placehold.co/400x300/EEEEEE/333333?text=Red+Bull" },
        { answer: "NIKE", image: "https://placehold.co/400x300/EEEEEE/333333?text=Nike" },
        { answer: "ADIDAS", image: "https://placehold.co/400x300/EEEEEE/333333?text=Adidas" },
        { answer: "PUMA", image: "https://placehold.co/400x300/EEEEEE/333333?text=Puma" },
        { answer: "ROLEX", image: "https://placehold.co/400x300/EEEEEE/333333?text=Rolex" },
        { answer: "YOUTUBE", image: "https://placehold.co/400x300/EEEEEE/333333?text=YouTube" },
        { answer: "VISA", image: "https://placehold.co/400x300/EEEEEE/333333?text=Visa" },
        { answer: "MASTERCARD", image: "https://placehold.co/400x300/EEEEEE/333333?text=Mastercard" }
    ];

    let current = 0;
    let score = 0;

    function load() {
        document.getElementById('logo-image').src = quizData[current].image;
        document.getElementById('answer-text').style.display = 'none';
        
        document.getElementById('reveal-btn').style.display = 'inline-block';
        document.getElementById('correct-btn').style.display = 'none';
        document.getElementById('incorrect-btn').style.display = 'none';
        
        document.getElementById('q-num').textContent = current + 1;
    }

    function reveal() {
        document.getElementById('answer-text').textContent = quizData[current].answer;
        document.getElementById('answer-text').style.display = 'block';
        
        document.getElementById('reveal-btn').style.display = 'none';
        document.getElementById('correct-btn').style.display = 'inline-block';
        document.getElementById('incorrect-btn').style.display = 'inline-block';
    }

    function scorePoint(isCorrect) {
        if(isCorrect) {
            score++;
            document.getElementById('score').textContent = score;
            // Fire a quick burst of confetti for correct answers
            confetti({
                particleCount: 100,
                spread: 70,
                origin: { y: 0.6 }
            });
        }
        
        current++;
        
        if(current < quizData.length) {
            load();
        } else {
            // End of the game
            document.getElementById('logo-image').style.display = 'none';
            document.getElementById('answer-text').innerHTML = `Game Over!<br>Final Score: ${score} / 30`;
            document.getElementById('answer-text').style.display = 'block';
            
            document.getElementById('correct-btn').style.display = 'none';
            document.getElementById('incorrect-btn').style.display = 'none';
            
            // Grand finale confetti
            var duration = 3000;
            var end = Date.now() + duration;
            (function frame() {
                confetti({ particleCount: 5, angle: 60, spread: 55, origin: { x: 0 } });
                confetti({ particleCount: 5, angle: 120, spread: 55, origin: { x: 1 } });
                if (Date.now() < end) requestAnimationFrame(frame);
            }());
        }
    }

    // Start the game immediately
    load();
</script>
</body>
</html>
